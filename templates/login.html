<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PogClip — Log In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#07090D; --card:#111621; --border:#1C2333;
  --cyan:#00F0FF; --pink:#FF2D6B; --text:#EDF2F7; --muted:#5A6A80;
}
body {
  background:var(--bg); color:var(--text);
  font-family:'Barlow',sans-serif;
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; justify-content:center; padding:1.5rem;
}
/* Grid bg */
body::before {
  content:''; position:fixed; inset:0;
  background-image:
    linear-gradient(rgba(0,240,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,240,255,0.03) 1px,transparent 1px);
  background-size:50px 50px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black,transparent);
  pointer-events:none;
}
.logo {
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem; letter-spacing:3px;
  text-decoration:none; color:var(--text);
  margin-bottom:2rem;
}
.logo em { color:var(--cyan); font-style:normal; }
.card {
  background:var(--card); border:1px solid var(--border);
  border-radius:20px; padding:2.5rem;
  width:100%; max-width:420px;
  position:relative; overflow:hidden;
}
.card::before {
  content:''; position:absolute;
  top:0; left:0; right:0; height:3px;
  background:linear-gradient(90deg,var(--cyan),var(--pink));
}
.card-title {
  font-family:'Bebas Neue',sans-serif;
  font-size:2rem; letter-spacing:2px;
  margin-bottom:0.35rem;
}
.card-sub { color:var(--muted); font-size:0.88rem; margin-bottom:2rem; }

.error-box {
  background:rgba(255,45,107,0.08);
  border:1px solid rgba(255,45,107,0.2);
  color:var(--pink); border-radius:8px;
  padding:0.75rem 1rem; font-size:0.85rem;
  margin-bottom:1.5rem;
}

.field { margin-bottom:1.2rem; }
.field label {
  display:block; font-size:0.78rem; font-weight:700;
  text-transform:uppercase; letter-spacing:1px;
  color:var(--muted); margin-bottom:0.5rem;
}
.field input {
  width:100%; padding:0.85rem 1rem;
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border); border-radius:10px;
  color:var(--text); font-family:'Barlow',sans-serif;
  font-size:0.95rem; transition:border-color 0.2s;
  outline:none;
}
.field input:focus { border-color:var(--cyan); }
.field input::placeholder { color:var(--muted); }

.remember {
  display:flex; align-items:center; gap:0.5rem;
  font-size:0.85rem; color:var(--muted);
  margin-bottom:1.5rem; cursor:pointer;
}
.remember input { width:auto; cursor:pointer; accent-color:var(--cyan); }

.btn {
  width:100%; padding:0.95rem;
  background:var(--cyan); color:#000;
  border:none; border-radius:10px;
  font-family:'Barlow',sans-serif;
  font-size:1rem; font-weight:800;
  cursor:pointer; transition:all 0.2s;
  letter-spacing:0.3px;
}
.btn:hover { opacity:0.88; transform:translateY(-1px); }

.divider {
  display:flex; align-items:center; gap:1rem;
  margin:1.5rem 0; color:var(--muted); font-size:0.8rem;
}
.divider::before,.divider::after {
  content:''; flex:1; height:1px; background:var(--border);
}

.signup-link {
  text-align:center; font-size:0.88rem; color:var(--muted);
}
.signup-link a { color:var(--cyan); text-decoration:none; font-weight:600; }
.signup-link a:hover { text-decoration:underline; }

.footer-note {
  margin-top:1.5rem; font-size:0.75rem;
  color:var(--muted); text-align:center;
}
.footer-note a { color:var(--muted); }
</style>
</head>
<body>

<a href="/" class="logo">POG<em>CLIP</em></a>

<div class="card">
  <h1 class="card-title">Welcome Back</h1>
  <p class="card-sub">Log in to see your clips and dashboard.</p>

  {% if error %}
  <div class="error-box">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <div class="field">
      <label>Email</label>
      <input type="email" name="email" placeholder="you@email.com"
             value="{{ email or '' }}" required autofocus>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" name="password" placeholder="••••••••" required>
    </div>
    <label class="remember">
      <input type="checkbox" name="remember"> Keep me logged in
    </label>
    <button type="submit" class="btn">Log In →</button>
  </form>

  <div class="divider">or</div>

  <div class="signup-link">
    Don't have an account? <a href="/signup">Sign up free</a>
  </div>
</div>

<p class="footer-note">
  By logging in you agree to our <a href="#">Terms</a> and <a href="#">Privacy Policy</a>
</p>

</body>
</html>
